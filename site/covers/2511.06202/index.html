    <title>ExpReS-VLA: Specializing Vision-Language-Action Models Through Experience Replay and Retrieval - 封面卡</title>
    <meta name="description" content="论文提出了一种名为ExpReS-VLA的方法，旨在解决预训练的视觉-语言-动作（VLA）模型在特定部署环境中进行快速适应时遇到的灾难性遗忘和性能下降问题。该方法通过压缩的经验回放和检索增强生成技术，使模型能够在设备端利用少量演示（12个）快速适应新环境，同时保留原有能力。ExpReS-VLA通过存储视觉编码器的嵌入而非原始图像，实现了97%的存储空间节省，并结合检索到的相似经验和一种新的对比损失函数（THCL）来学习成功与失败的经验。实验表明，该方法在模拟和真实机器人任务上均显著提升了任务成功率。" />
