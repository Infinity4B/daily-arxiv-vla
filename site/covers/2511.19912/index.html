    <title>Reasoning-VLA: A Fast and General Vision-Language-Action Reasoning Model for Autonomous Driving - 封面卡</title>
    <meta name="description" content="论文提出了一种名为Reasoning-VLA的通用且快速的视觉-语言-动作（VLA）推理模型，用于解决现有自动驾驶VLA模型在推理效率和泛化能力方面的不足。该模型通过一组可学习的动作查询与增强推理的视觉-语言特征交互，实现连续动作轨迹的并行生成。为了提升泛化性，研究整合了八个公开的自动驾驶数据集，构建了一个基于思维链推理的统一数据集。结合监督微调（SFT）和强化学习（RL）的训练策略，实验表明Reasoning-VLA在多个基准上实现了最先进的性能、卓越的泛化能力和目前报告的优异推理速度。" />
