    <title>Impromptu VLA: Open Weights and Open Data for Driving Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="论文提出了Impromptu VLA，一个开放权重和开放数据的驾驶视觉-语言-动作模型。其核心贡献是Impromptu VLA数据集，该数据集专注于非结构化道路的“corner case”场景，旨在解决当前视觉-语言-动作（VLA）模型在这些场景下表现不佳的问题。数据集包含超过80,000个精心筛选的视频片段，源自8个开源的大规模数据集，总计超过200万个源片段。该数据集基于一个包含四种具有挑战性的非结构化类别的新分类法构建，并提供了丰富的、面向规划的问答标注和动作轨迹。实验表明，使用该数据集训练的VLA模型在既定基准上实现了显著的性能提升，包括提高了NeuroNCAP闭环评分和降低碰撞率，并在nuScenes开放环轨迹预测中达到接近最先进的L2准确度。" />
