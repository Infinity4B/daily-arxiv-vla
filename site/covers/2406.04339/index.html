    <meta name="description" content="该论文提出了RoboMamba，一个高效的视觉-语言-行动（VLA）模型，用于机器人推理和操作。RoboMamba基于Mamba架构，旨在解决现有VLA模型在复杂任务推理能力不足和计算成本高的问题。模型集成了视觉编码器和Mamba语言模型，通过两阶段训练策略，使其同时具备通用常识、机器人相关推理能力和低级操作技能，并保持了高效的微调和推理速度。" />
