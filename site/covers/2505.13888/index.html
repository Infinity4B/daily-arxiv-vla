    <title>InSpire: Vision-Language-Action Models with Intrinsic Spatial Reasoning - 封面卡</title>
    <meta name="description" content="本文提出了一种名为InSpire（Intrinsic Spatial Reasoning）的方法，旨在提升视觉-语言-动作模型（VLAs）的空间推理能力，以减少虚假相关性对模型泛化性能的负面影响。现有VLAs倾向于在任务无关的视觉特征与动作之间建立虚假相关性，限制了其泛化能力。InSpire通过在语言指令前添加一个关于目标物体相对于机器人方向的视觉问答（VQA）问题，引导模型关注任务相关因素，并将模型的答案与真实动作对齐，从而增强空间推理。该方法无需额外数据或与其他大型模型交互，可作为插件式模块增强现有自回归VLAs。" />
