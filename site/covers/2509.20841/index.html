    <title>ImaginationPolicy: Towards Generalizable, Precise and Reliable End-to-End Policy for Robotic Manipulation - 封面卡</title>
    <meta name="description" content="论文提出了一种名为ImaginationPolicy的端到端机器人操作策略，旨在解决传统模块化管道信息丢失和特征对齐问题。该方法通过可操作性导向的关键点实现对多样化操作任务的统一表示，显著提升机器人在抓取、倒水等任务中的泛化能力和精度。研究采用Chain of Moving Oriented Keypoints (CoMOK)作为动作表示，将操作行为转化为关键点序列，使网络能在不同形状/尺寸物体间实现亚厘米级精度。" />
