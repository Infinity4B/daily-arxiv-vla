    <title>CLAW: A Vision-Language-Action Framework for Weight-Aware Robotic Grasping - 封面卡</title>
    <meta name="description" content="提出CLAW（CLIP-Language-Action for Weight）框架，用于“重量感知”的机器人抓取。核心思想是将条件评估从动作生成中解耦：由轻量的微调CLIP作为提示生成器，实时监测电子秤读数并产生离散语言提示（continue/stop）；π₀ 作为流匹配VLA策略接收多视角视觉与语言提示，生成连续控制信号。验证表明CLAW在单物体与混合物体场景中均可可靠执行重量约束抓取，并优于原始与仅微调的π₀。" />
