    <title>PhysToolBench: Benchmarking Physical Tool Understanding for MLLMs - 封面卡</title>
    <meta name="description" content="PhysToolBench是一个专门评估多模态大语言模型（MLLMs）物理工具理解能力的基准。它采用视觉问答（VQA）格式，涵盖超过1000个图像文本对，分为三个难度级别：工具识别（Tool Recognition）、工具理解（Tool Understanding）和工具创建（Tool Creation）。论文评估了32个不同类型的MLLMs，包括专有、开源、具体化和VLA骨干模型，发现当前MLLMs在工具理解方面存在显著不足，性能远低于人类表现（超过90% vs MLLMs最高63%）。" />
