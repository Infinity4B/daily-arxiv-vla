    <title>EdgeVLA: Efficient Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="该论文介绍了EdgeVLA (EVLA)，一种新颖的视觉-语言-动作（VLA）模型，旨在显著提高VLA模型的推理速度和效率，使其能在资源受限的边缘设备上实现实时性能。传统的大规模VLA模型如OpenVLA虽然性能强大，但在移动操控系统等计算资源有限的平台上部署困难。EVLA通过两个核心创新解决了这个问题：1) 取消了末端执行器位置预测的自回归要求，从而将推理速度提升了7倍；2) 利用小型语言模型（SLMs）的效率，以显著降低的计算需求实现了与更大模型可比的训练性能。论文的早期结果表明，EVLA在保持与OpenVLA相当训练特性的同时，在推理速度和内存效率方面获得了巨大提升。" />
