    <title>Zero-Shot 3D Visual Grounding from Vision-Language Models - 封面卡</title>
    <meta name="description" content="3D视觉定位（3DVG）旨在根据自然语言描述在3D场景中定位目标对象，对增强现实和机器人等下游应用至关重要。现有方法通常依赖于带标注的3D数据和预定义类别，限制了其在开放世界场景下的可扩展性。本文提出了SeeGround，一个零样本的3DVG框架，它利用2D视觉语言模型（VLMs）来绕过对3D特定训练的需求。为了弥合模态差距，论文引入了一种混合输入格式，该格式将查询对齐的渲染视图与空间丰富的文本描述相结合。该框架包含两个核心组件：一个基于查询动态选择最优视点的视角自适应模块，以及一个融合视觉和空间信号以提高定位精度的融合对齐模块。在ScanRefer和Nr3D数据集上的广泛评估证实，SeeGround显著优于现有的零样本基线，并与完全监督的替代方案相媲美，在挑战性条件下展现了强大的泛化能力。" />
