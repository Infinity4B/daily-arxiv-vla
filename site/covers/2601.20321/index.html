    <title>Tactile-Force Alignment in Vision-Language-Action Models for Force-aware Manipulation - 封面卡</title>
    <meta name="description" content="当前视觉-语言-动作模型主要依赖视觉模态，缺乏处理接触丰富任务所需的精确力调节和物理直觉。本文针对此“力盲”问题，提出了从“触觉-视觉对齐”到“触觉-力对齐”的范式转变。论文介绍了TaF-VLA框架，该框架通过显式地将高维触觉观测与物理相互作用力关联起来，以实现力感知操作。核心贡献包括一个自动化触觉-力数据采集设备及由此构建的大规模TaF数据集、一个名为TaF-Adapter的触觉-力对齐模块，以及将该模块集成到VLA主干网络中形成的TaF-VLA策略。实验表明，TaF-VLA在接触丰富的任务上显著优于现有的触觉-视觉对齐及纯视觉基线模型。" />
