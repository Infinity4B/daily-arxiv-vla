    <title>How Do VLAs Effectively Inherit from VLMs? - 封面卡</title>
    <meta name="description" content="该论文探讨了视觉-语言-行动模型如何有效地从预训练的视觉-语言模型中继承知识。为了解决这一核心问题并应对训练过程中可能出现的灾难性遗忘，研究者们引入了一个名为GrinningFace的诊断基准。该基准是一个表情符号桌面操作任务，要求机器人根据语言指令将物体放置在对应的印刷表情符号上。由于表情符号在VLM的预训练数据中广泛存在，但在标准机器人数据集中几乎不存在，该任务的成功完成可以清晰地表明VLM的先验知识被有效迁移到了具身控制中。论文通过在模拟和真实机器人上进行系统性实验，比较了多种有前景的知识迁移技术，揭示了保留VLM先验知识对于VLA泛化能力的关键重要性，并为未来开发真正可泛化的具身智能系统提供了指导。" />
