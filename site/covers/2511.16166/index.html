    <title>EvoVLA: Self-Evolving Vision-Language-Action Model - 封面卡</title>
    <meta name="description" content="论文提出EvoVLA框架，用于解决视觉-语言-行动（VLA）模型在长视野机器人操作中的“阶段幻觉”问题（即智能体通过利用粗糙的评估信号来走捷径多步骤任务，报告高进展但实际任务未完成）。该框架通过三个协同组件实现：阶段对齐奖励（SAR）使用Gemini生成的硬负例进行三元组对比学习；基于位姿的对象探索（POE）将好奇心锚定在相对对象-夹爪位姿而非像素上；以及具有选择性上下文和门控融合的长期记忆，用于稳定内在奖励塑造。在Discoverse-L基准测试（包含三个多阶段任务）上的评估表明，EvoVLA平均成功率比最强基线高10.2个百分点，达到69.2%，样本效率提高1.5倍，阶段幻觉率从38.5%降至14.8%。真实机器人部署的平均成功率为54.6%。" />
