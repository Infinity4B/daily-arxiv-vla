    <title>RoVer: Robot Reward Model as Test-Time Verifier for Vision-Language-Action Model - 封面卡</title>
    <meta name="description" content="RoVer是一个针对视觉-语言-动作（VLA）模型的外部测试时缩放框架，旨在通过引入一个紧凑的机器人过程奖励模型（PRM）作为测试时验证器，在不修改原始VLA架构或权重的情况下增强其性能。该方法通过生成多个候选动作并使用PRM预测标量过程奖励和动作空间方向，以选择最优动作执行。关键是通过缓存共享感知特征来摊销感知成本，从而实现高效的测试时计算资源分配。" />
