    <title>Saliency-Aware Quantized Imitation Learning for Efficient Robotic Control - 封面卡</title>
    <meta name="description" content="论文研究单位 Hanyang University, Hyundai Motor Company, Seoul, Republic of Korea 论文概述 本文提出显著性感知量化模仿学习（SQIL）方法，用于高效机器人控制。深度神经网络策略模型（如视觉-语言-动作模型）在复杂决策中表现出色，但模型规模扩大导致计算开销增加，难以在资源受限设备（如机器人操作、自动驾驶）上部署。SQIL结合量化感知训练与选择性损失加权策略，通过显著性分数识别任务关键状态并在训练损失中强调这些状态，从而在低比特精度下保持决策保真度。实验表明，SQIL在多个模拟基准、真实任务和跨域任务（自动驾驶、物理模拟）中恢复全精度性能：例如，在机器人操作LIBERO基准上，4-bit权重量化模型在边缘GPU实现2.5倍加速和2.5倍节能；在自动驾驶NoCrash基准上，4-bit权重和激活量化策略保持全精度性能，在低端GPU实现3.7倍加速和3.1倍节能，展示了其在资源受限设备上部署大规模策略的潜力。" />
