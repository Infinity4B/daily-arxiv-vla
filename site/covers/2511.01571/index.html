    <title>PixelVLA: Advancing Pixel-level Understanding in Vision-Language-Action Model - 封面卡</title>
    <meta name="description" content="PixelVLA 是首个支持像素级理解和多模态提示（文本和视觉输入）的视觉-语言-动作（VLA）模型。现有 VLAs 局限于图像级理解且依赖文本提示，导致空间推理和跨域泛化能力不足。PixelVLA 通过集成多尺度像素感知编码器、视觉提示编码器和连续动作解码器，解决这些挑战。使用两阶段自动注释管道生成的 Pixel-160K 数据集进行训练，该数据集包含 160K 操作片段和 6.5M 图像-文本-动作三元组。PixelVLA 在三个标准 VLA 基准测试（SimplerEnv、Google Robot、LIBERO）上显著优于 OpenVLA，成功率提升 10.1%~28.7%，且训练成本仅为 OpenVLA 的 1.5%。" />
