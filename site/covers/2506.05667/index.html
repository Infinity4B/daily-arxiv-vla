    <title>DriveAction: A Benchmark for Exploring Human-like Driving Decisions in VLA Models - 封面卡</title>
    <meta name="description" content="该论文介绍了 DriveAction，一个专为视觉-语言-动作（VLA）模型设计的、以动作为驱动的自动驾驶基准。该基准旨在解决现有基准在场景多样性、可靠的动作级标注以及与人类偏好对齐的评估协议方面的不足。DriveAction 包含 16,185 个 QA 对，源自 2,610 个驾驶场景，它利用自动驾驶车辆驾驶员主动收集的真实世界数据，提供与人类驾驶偏好对齐的高级别离散动作标签，并实施一个以动作为根的树状评估框架，以系统地评估从视觉、语言到动作的完整决策过程。" />
