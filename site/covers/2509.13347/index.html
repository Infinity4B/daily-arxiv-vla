    <title>OpenHA: A Series of Open-Source Hierarchical Agentic Models in Minecraft - 封面卡</title>
    <meta name="description" content="该论文探讨了在开发具有端到端训练能力的智能体时，动作表示选择的关键问题。研究首先在Minecraft环境中对多种动作抽象方法进行了大规模、系统性的比较，发现没有单一的动作空间是普遍最优的，其有效性高度依赖于具体任务。为解决这一难题，论文提出了“动作链”（Chain of Action, CoA）框架，该框架将高层规划与低层控制统一在单个视觉-语言-动作（VLA）模型中。此外，研究还展示了一个“All-in-One”智能体，通过在混合动作空间数据集上使用CoA范式进行训练，学习到更鲁棒和泛化的策略，并在整体任务成功率上达到了新的最先进水平。为了促进可复现研究，论文发布了OpenHA套件，包括全面的基准测试、精选数据集、源代码和所有预训练模型检查点。" />
