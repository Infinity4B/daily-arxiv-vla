    <title>IPR-1: Interactive Physical Reasoner - 封面卡</title>
    <meta name="description" content="论文提出了交互式物理推理器，旨在让智能体通过与环境交互来学习并持续改进人类般的物理推理能力。研究在Game-to-Unseen (G2U)设定下进行，策划了超过1000个具有不同物理和因果机制的异构游戏，并采用受马斯洛需求层次启发的三个级别进行评估：生存、好奇心和效用，分别对应从原始直觉到目标驱动推理的递进。分析发现，现有的VLM/VLA模型虽有推理能力但缺乏交互中的前瞻性，而世界模型能想象未来但倾向于模仿视觉模式而非分析物理因果。因此，IPR利用世界模型的推演来评分和强化VLM的策略，并引入了PhysCode，一种以物理为中心的动作代码，用于统一语义意图与动态，为预测和推理提供共享的动作空间。在1000多个游戏上预训练的IPR在三个级别上表现稳健，总体与GPT-5相当，并在好奇心上超越GPT-5，且性能随训练游戏和交互步数的增加而提升，并能零样本迁移到未见过的游戏中。" />
