    <title>LLaDA-VLA: Vision Language Diffusion Action Models - 封面卡</title>
    <meta name="description" content="该论文提出了LLaDA-VLA，这是首个基于预训练扩散视觉语言模型构建的视觉-语言-扩散-动作模型，用于机器人操作任务。为了解决预训练d-VLMs与机器人动作生成之间的领域差距以及掩码扩散范式在生成结构化动作序列方面的不足，论文引入了两个核心设计：一是局部化特殊令牌分类策略，通过将分类空间限制在特殊动作令牌上，降低了模型适应的难度；二是分层动作结构化解码策略，该策略在解码过程中显式地考虑动作内部和动作之间的依赖关系，生成了更连贯、精确的动作序列。大量的实验表明，LLaDA-VLA在模拟环境和真实机器人上的性能均显著优于现有的最先进视觉-语言-动作模型。" />
