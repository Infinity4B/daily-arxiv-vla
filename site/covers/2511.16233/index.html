    <title>FT-NCFM: An Influence-Aware Data Distillation Framework for Efficient VLA Models - 封面卡</title>
    <meta name="description" content="论文针对视觉-语言-行动（VLA）模型因依赖大规模、冗余且价值不均的数据集而导致的效率瓶颈问题，提出了一种以数据为中心的生成式数据蒸馏框架FT-NCFM。该框架通过一个自包含的影响评估引擎（Fact-Tracing, FT）来评估样本的内在价值，并利用该评估结果引导一个对抗性的神经特征函数匹配（NCFM）过程，从而合成一个信息密度高、可复用的数据核心集。实验证明，仅使用5%的合成数据训练模型，即可达到使用完整数据集训练85-90%的任务成功率，同时将训练时间减少80%以上，展示了数据蒸馏在构建高效VLA模型中的巨大潜力。" />
