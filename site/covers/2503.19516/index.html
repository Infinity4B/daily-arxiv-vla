    <title>Boosting Robotic Manipulation Generalization with Minimal Costly Data - 封面卡</title>
    <meta name="description" content="机器人操纵任务中，视觉-语言-行动模型的性能依赖于大量多样化的演示数据，但数据收集成本高昂，特别是涉及物理交互的数据。论文发现，操纵任务中的空间推理阶段数据易于低成本收集，且对模型泛化至关重要。为解决数据成本和覆盖度不足的问题，论文提出了RoboTron-Craft，一个成本效益高的物理真实轨迹生成管道，以及RoboTron-Platter方法，该方法通过解耦任务阶段，利用大量低成本的空间推理阶段数据来增强模型泛化，从而最大化利用昂贵但稀缺的物理交互阶段数据。" />
