    <title>TriVLA: A Triple-System-Based Unified Vision-Language-Action Model for General Robot Control - 封面卡</title>
    <meta name="description" content="TriVLA 是一个受认知神经科学中的情景记忆理论启发的视觉-语言-动作（VLA）统一框架，通过三系统架构实现了情景世界模型。该模型使机器人能够积累、回忆和预测顺序的多模态体验，从而在动态环境中实现鲁棒的长期任务执行。当前基于VLM的VLA系统主要依赖静态表示和有限的时间上下文，而TriVLA通过集成预训练的视觉语言模型（VLM）和视频扩散模型（VDM），提供了高层次的推理和动态预测能力，实验证明其在模拟和真实世界中均优于现有基线。" />
