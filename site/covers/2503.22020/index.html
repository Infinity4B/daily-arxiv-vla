    <title>CoT-VLA: Visual Chain-of-Thought Reasoning for Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="该论文提出了CoT-VLA，一种视觉-语言-动作模型，它通过引入显式的视觉思维链（CoT）推理来增强模型的性能。CoT-VLA首先生成一个代表未来子目标的图像，然后基于当前观测和生成的子目标图像来生成一个短动作序列以实现该子目标。该方法允许模型在执行动作前进行“视觉思考”，从而提升在复杂操作任务中的表现。论文通过在模拟基准和真实世界实验中进行广泛评估，证明了视觉思维链推理能提升VLA性能，并且在多个机器人平台和任务上实现了最先进的性能。" />
