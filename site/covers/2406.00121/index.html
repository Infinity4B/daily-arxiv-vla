    <title>Empowering Visual Creativity: A Vision-Language Assistant to Image Editing Recommendations - 封面卡</title>
    <meta name="description" content="本文旨在解决现有基于文本的图像编辑方法在处理用户模糊、高层次的编辑意图（称为&quot;编辑提示&quot;）时效果不佳的问题，这种情况下存在从抽象意图到具体指令的&quot;创造力差距&quot;。为此，论文提出了一个新任务——图像编辑推荐（IER），其目标是从一张输入图像和一个简单的编辑提示出发，自动生成一组多样化且具创意的编辑指令。为了实现该任务，作者构建了一个名为Creativity-Vision Language Assistant (Creativity-VLA)的多模态框架，并引入了一个独特的&quot;token-for-localization&quot;机制，以同时支持全局和局部编辑推荐。实验证明，该模型能生成既富有创意又与图像内容和用户初始提示高度相关的编辑建议。" />
    <script>
      (function() {
        try {
          var themePreference = window.localStorage.getItem('color-theme') || 'system';
          var systemUsesDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolvedTheme = themePreference === 'system'
            ? (systemUsesDarkTheme ? 'dark' : 'light')
            : themePreference;
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = themePreference;
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themePreference = 'system';
        }
      })();
    </script>
