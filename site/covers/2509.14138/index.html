    <title>SeqVLA: Sequential Task Execution for Long-Horizon Manipulation with Completion-Aware Vision-Language-Action Model - 封面卡</title>
    <meta name="description" content="长时序机器人操作任务要求执行多个相互依赖的子任务，错误检测机制可能引发级联失效。现有视觉-语言-动作（VLA）模型（如π₀）在连续低级控制方面表现出色，但缺乏识别子任务完成的内部信号，在顺序设置中表现脆弱。本研究提出SeqVLA，它是π₀的完成感知扩展，通过添加轻量级检测头感知当前子任务是否完成。该双头设计使模型不仅生成操作动作，还能自主触发子任务转换。研究调研了四种微调策略（联合或顺序微调，冻结或不冻结预训练主干网）。实验在沙拉包装（七个连续子任务）和糖果包装（四个子任务）上进行。结果显示SeqVLA显著提升整体成功率，其中联合微调并冻结主干网策略表现最佳，消除了顺序相关失效。" />
