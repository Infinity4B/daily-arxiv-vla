    <title>Phantom Menace: Exploring and Enhancing the Robustness of VLA Models against Physical Sensor Attacks - 封面卡</title>
    <meta name="description" content="本文首次系统性地研究了视觉-语言-动作（VLA）模型在面对物理传感器攻击时的脆弱性。鉴于VLA模型严重依赖摄像头和麦克风等传感器输入，作者旨在量化物理传感器攻击（如激光、电磁、超声波）对模型性能的影响，并探索相应的防御机制。论文提出了一个名为“真实-模拟-真实”的框架，用于自动模拟物理世界中的传感器攻击向量，并在模拟和真实机器人系统上进行验证。通过对多种VLA模型和任务进行大规模评估，研究揭示了这些模型存在的显著漏洞。最后，作者提出并验证了一种基于对抗训练的防御方法，以增强VLA模型对此类物理扰动的鲁棒性。" />
