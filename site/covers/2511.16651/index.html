    <title>InternData-A1: Pioneering High-Fidelity Synthetic Data for Pre-training Generalist Policy - 封面卡</title>
    <meta name="description" content="该论文提出了InternData-A1，一个大规模、高保真的合成机器人操作数据集。论文旨在验证纯合成数据在预训练视觉-语言-动作（VLA）模型时的有效性。研究团队通过一个高度自动化、完全解耦和组合式的仿真流水线生成了该数据集，涵盖了4种机器人形态、18种技能、70个任务、227个场景，总计63万条轨迹和7433小时的数据，涉及刚性、铰接、柔性及流体物体的操作。核心发现是，一个仅使用InternData-A1预训练的π0模型，其性能可以媲美甚至超过在闭源的真实数据集π-dataset上预训练的官方π0模型，并且在多项任务上表现出惊人的零样本仿真到真实世界的迁移能力。论文将开源该数据集及其生成流水线，以降低机器人研究的数据获取门槛。" />
