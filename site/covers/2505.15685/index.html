    <title>From Grounding to Manipulation: Case Studies of Foundation Model Integration in Embodied Robotic Systems - 封面卡</title>
    <meta name="description" content="论文研究了三种基础模型（Foundation Models）在具身机器人系统中的集成策略：端到端视觉-语言-动作模型（VLAs）、模块化视觉-语言模型（VLM）管道，以及多模态大语言模型（MLLM）代理作为编排者。通过两个案例研究——指令基础（instruction grounding）和机器人操作（robotic manipulation）——评估了这些策略在复杂指令跟随和通用动作生成中的权衡。实验揭示了模型规模、泛化能力和数据效率之间的平衡点，为语言驱动的物理代理提供了设计见解。" />
