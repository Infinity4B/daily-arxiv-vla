    <title>MoS-VLA: A Vision-Language-Action Model with One-Shot Skill Adaptation - 封面卡</title>
    <meta name="description" content="现有的大规模视觉-语言-动作（VLA）模型在跨实验室、环境与任务上的泛化能力不足，通常需要在新场景中收集一定量的专家演示并进行参数微调才能奏效。本文提出 MoS-VLA（Mixture of Skills VLA），通过“技能混合”的方式将机器人策略表示为有限基函数的线性组合，从而构建结构化的技能空间；在线推理时，仅需一次专家演示，通过最小化 L1 行动误差的轻量凸优化（线性规划）得到系数，无需梯度回传即可在新环境中快速适配，显著降低适配开销。论文基于 OpenVLA 与 Open X-Embodiment 数据进行训练，并在仿真与真实机械臂任务上验证效果。" />
