    <title>SITCOM: Scaling Inference-Time COMpute for VLAs - 封面卡</title>
    <meta name="description" content="论文提出了一种名为SITCOM（Scaling Inference-Time COMpute for VLAs）的框架，旨在解决视觉-语言-动作模型在长时程任务中缺乏前瞻规划和误差累积的问题。该框架通过结合预训练的VLA、一个学习的动力学模型和一个奖励模型，将VLA从单步动作执行器转变为能够进行多步规划的鲁棒长期规划器。SITCOM利用模型预测控制（MPC）的思想，在推理时生成多个动作序列的展开，并通过奖励机制选择最优序列执行。在SIMPLER环境中的实验表明，该方法能将任务完成率从48%显著提升至72%。" />
