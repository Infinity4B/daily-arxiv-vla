    <title>SafeVLA: Towards Safety Alignment of Vision-Language-Action Model via Constrained Learning - 封面卡</title>
    <meta name="description" content="该论文探讨了如何将安全约束明确地整合到视觉-语言-动作模型（VLA）中。VLA作为通用机器人策略具有巨大潜力，但在实际部署中存在极端安全挑战，可能对环境、机器人自身和人类造成伤害。作者提出了一种集成安全方法（ISA），系统地建模安全需求，主动激发多样化的不安全行为，通过安全强化学习有效约束VLA策略，并通过有针对性的评估来严格确保其安全性。该方法利用约束马尔可夫决策过程（CMDP）范式，从最小-最大角度优化VLA以应对激发的安全风险。实验表明，通过ISA对齐的策略实现了有效的安全-性能权衡，与最先进方法相比，安全违规累积成本降低了83.58%，同时任务成功率提高了3.85%，并在长尾风险缓解和极端故障场景处理上表现出强大的安全保证，以及对分布外扰动的鲁棒泛化能力。" />
