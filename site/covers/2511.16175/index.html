    <title>Mantis: A Versatile Vision-Language-Action Model with Disentangled Visual Foresight - 封面卡</title>
    <meta name="description" content="本文提出了一种名为 Mantis 的视觉-语言-动作 (VLA) 模型，旨在解决现有 VLA 模型面临的挑战：直接预测高维视觉状态会分散模型容量并带来高昂的训练成本，而压缩视觉状态则会引入信息瓶颈，同时现有方法常因忽视语言监督而导致理解与推理能力不佳。Mantis 引入了核心创新——解耦视觉预测 (DVF)，通过结合元查询和扩散 Transformer (DiT) 头，将视觉预测任务与主干网络解耦。当前视觉状态通过残差连接提供给 DiT，使得元查询能自动捕捉描绘视觉轨迹的潜在动作，从而提升显式动作学习。这种解耦设计减轻了主干网络的负担，使其能通过语言监督保持理解和推理能力。实验表明，在 LIBERO 基准上微调后，Mantis 取得了 96.7% 的成功率，并在真实世界评估中表现出优于基线模型的指令跟随、泛化和推理能力。" />
