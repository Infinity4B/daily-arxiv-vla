    <title>Audio-VLA: Adding Contact Audio Perception to Vision-Language-Action Model for Robotic Manipulation - 封面卡</title>
    <meta name="description" content="本文提出了Audio-VLA，一种将接触音频感知融入视觉-语言-行动模型的多模态机器人操控策略。传统VLA模型仅依赖视觉感知，在感知接触事件和动态操作过程方面存在根本性局限。Audio-VLA通过引入接触音频来克服这一限制，利用音频信号提供视觉无法捕捉的物理交互信息，如接触质量和材料属性。此外，本文还提出了一种新的评估指标——任务完成率，用于更系统地评估机器人在动态操作过程中的感知能力。实验在LIBERO、RLBench仿真环境以及两个真实世界任务中验证了Audio-VLA的优越性能。" />
