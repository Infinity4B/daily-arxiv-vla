    <title>RICL: Adding In-Context Adaptability to Pre-Trained Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="本文提出了一种名为RICL（Retraining for In-Context Learning）的方法，旨在向预训练的视觉-语言-动作（VLA）模型中注入上下文学习能力。传统VLA模型缺乏上下文学习（ICL）能力，而RICL通过微调少量机器人演示数据，使模型能够利用检索增强生成（RAG）和ICL适应新任务。用户只需提供10-20个目标任务演示，RICL即可检索相关上下文信息并提升任务性能，无需参数更新。实验应用于π₀-FAST VLA，在涉及未见对象、新颖动作和新场景的操作任务中验证了有效性。" />
