    <title>DepthVLA: Enhancing Vision-Language-Action Models with Depth-Aware Spatial Reasoning - 封面卡</title>
    <meta name="description" content="DepthVLA是一篇针对视觉-语言-动作模型（Vision-Language-Action, VLA）在精确空间推理方面表现不佳的研究。当前基于大规模语言/视觉预训练的VLA虽然在语义理解上表现强劲，但普遍缺乏精细的空间理解，导致在精准抓取、避障与精细操作任务中失败。DepthVLA通过引入预训练的深度预测模块作为“深度专家”，在保持语言理解与开放词汇感知的同时显式增强几何推理能力。" />
