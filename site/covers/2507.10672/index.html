    <title>Vision Language Action Models in Robotic Manipulation: A Systematic Review - 封面卡</title>
    <meta name="description" content="本文是一篇关于机器人操作领域中视觉语言动作模型的系统性综述。它旨在全面整合视觉感知、自然语言理解和具身控制于一个统一的学习框架中。该综述分析了102个VLA模型、26个基础数据集和12个仿真平台，并提出了一个新颖的VLA数据集基准测试框架，该框架基于任务复杂性和模态丰富度。文章还探讨了VLA模型的应用、评估方法、当前面临的挑战以及未来的研究方向，为推进具身智能和通用机器人控制提供了技术参考和概念路线图。" />
