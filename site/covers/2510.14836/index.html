    <title>QDepth-VLA: Quantized Depth Prediction as Auxiliary Supervision for Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="论文提出QDepth-VLA框架，旨在通过引入量化深度预测作为辅助监督信号，增强视觉-语言-动作（VLA）模型的空间感知和推理能力。现有VLA模型在长时序和精细操作任务中表现不佳，主要因缺乏3D几何理解。QDepth-VLA利用向量量化（VQ-VAE）将深度图转换为离散令牌，并设计专门的深度专家模块预测这些令牌，避免干扰预训练语义对齐。实验在模拟和真实机器人任务上验证了其有效性。" />
