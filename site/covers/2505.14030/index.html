    <title>AutoBio: A Simulation and Benchmark for Robotic Automation in Digital Biology Laboratory - 封面卡</title>
    <meta name="description" content="AutoBio 是一个针对数字生物实验室的机器人自动化模拟框架和基准测试。现有视觉-语言-动作（VLA）模型的基准测试主要聚焦于家庭任务，缺乏对专业科学领域的评估。生物实验室实验具有结构化协议、高精度要求和多模态交互的特点，但现有模拟器在处理流体、数字界面和实验室特有物理机制方面存在局限。AutoBio 通过仪器数字化、物理插件和渲染技术，构建了一个高保真度的生物实验模拟环境，并设计了一套涵盖基础生物学操作的基准任务，用于评估VLA模型在科学工作流中的表现。" />
