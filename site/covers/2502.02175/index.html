    <title>VLA-Cache: Towards Efficient Vision-Language-Action Model via Adaptive Token Caching in Robotic Manipulation - 封面卡</title>
    <meta name="description" content="本文针对视觉-语言-动作（VLA）模型在实时机器人控制中计算成本高昂的问题，提出了一种名为VLA-Cache的训练无关推理加速方法。该方法利用机器人操作中连续帧之间的时间冗余，通过自适应地缓存和复用视觉上未发生显著变化的静态token的键值（KV）表示，来减少计算开销。同时，为保持动作的精确性，VLA-Cache会过滤掉对任务至关重要但视觉上静态的token，确保对这些区域进行重新计算。此外，还引入了一种分层自适应token复用策略，根据解码器各层的注意力集中程度动态调整复用比例。实验表明，VLA-Cache在多个模拟环境和真实机器人上实现了最高1.7倍的推理速度提升和15%的控制频率增加，而对任务成功率的影响微乎其微。" />
