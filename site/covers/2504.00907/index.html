    <title>Grounding Multimodal LLMs to Embodied Agents that Ask for Help with Reinforcement Learning - 封面卡</title>
    <meta name="description" content="本文提出 Ask-to-Act 任务，研究具身智能体在部分可观测的家居环境中，如何通过最少且相关的澄清问题解决模糊指令，完成单或多物体重排任务。作者提出 AutoAsk 方法，利用强化学习（RL）微调多模态大语言模型（MLLM）作为视觉-语言-行动（VLA）策略，通过大型语言模型（LLM）生成奖励信号，无需大规模人类演示或手动设计奖励。实验表明，该方法在未见场景和任务上显著优于零样本基线（如 GPT-4o）和监督微调模型。" />
