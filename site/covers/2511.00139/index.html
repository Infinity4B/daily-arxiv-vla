    <title>End-to-End Dexterous Arm-Hand VLA Policies via Shared Autonomy: VR Teleoperation Augmented by Autonomous Hand VLA Policy for Efficient Data Collection - 封面卡</title>
    <meta name="description" content="论文针对灵巧手在一般机器人中的manipulation挑战，提出一种共享自治（Shared Autonomy）框架，结合人类VR远程操作和自主DexGrasp-VLA策略（用于手部控制），以高效收集协调手臂-手部演示数据。该框架通过分工控制宏-微运动域：人类引导手臂，VLA Copilot执行精细抓取，降低认知负担。数据用于训练端到端VLA策略（含Arm-Hand Feature Enhancement模块），并通过校正远程操作（Corrective Teleoperation）持续改进。实验显示，策略在50+物体上达约90%成功率，数据质量高。" />
