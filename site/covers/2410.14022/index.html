    <title>Vision-Language-Action Model and Diffusion Policy Switching Enables Dexterous Control of an Anthropomorphic Hand - 封面卡</title>
    <meta name="description" content="该论文提出了一种结合微调的视觉-语言-动作（VLA）模型与扩散模型的混合控制方法，用于实现人形手的灵巧操作。VLA模型负责基于语言指令的高级规划，具有高泛化性；扩散模型则处理低级交互，为特定物体和环境提供所需的精度和鲁棒性。通过在训练数据中加入切换信号，实现了两个模型之间基于事件的转换，应用于通过语言指令指定目标物体和放置位置的抓取-放置任务。该方法在13自由度的ADAPT Hand 2上进行了部署，这是首次将VLA模型应用于多指手。实验表明，该混合方法的成功率超过80%，而仅使用VLA模型的成功率低于40%。" />
