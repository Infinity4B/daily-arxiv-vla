    <title>USIM and U0: A Vision-Language-Action Dataset and Model for General Underwater Robots - 封面卡</title>
    <meta name="description" content="针对水下机器人数据稀缺、多任务泛化困难的问题，论文提出USIM，一个基于仿真的多任务视觉-语言-动作(VLA)数据集，覆盖9种场景和20项任务(561K帧，1,852条轨迹，约15.6小时)，并基于USIM训练得到水下通用VLA模型U0。U0采用多模态融合与卷积-注意力感知聚焦增强(CAP)模块，在检查、避障、扫描与动态跟踪等任务上平均成功率约80%，在挑战性移动抓取任务中较基线将机器人-目标距离缩短21.2%，证明仿真数据可有效驱动水下VLA能力形成。" />
