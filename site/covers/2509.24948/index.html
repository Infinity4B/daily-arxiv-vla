    <title>World-Env: Leveraging World Model as a Virtual Environment for VLA Post-Training - 封面卡</title>
    <meta name="description" content="Vision-Language-Action (VLA) 模型在少样本与高风险场景下受限：模仿学习对大量演示数据依赖强，强化学习（RL）后训练需真实交互但环境状态不可重置、反馈稀疏且难以判定任务完成。作者提出 World-Env，将世界模型作为低成本、可安全探索的虚拟环境用于 VLA 的 RL 后训练：包括一个视频世界模型用于生成时序一致的未来视觉观测，和一个 VLM 引导的即时反射器用于连续奖励与实时终止信号。该方法在 5 条专家演示下即可显著提升复杂操控任务的成功率，兼顾数据效率与安全性。" />
