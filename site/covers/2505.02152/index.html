    <title>Interleave-VLA: Enhancing Robot Manipulation with Interleaved Image-Text Instructions - 封面卡</title>
    <meta name="description" content="本文提出了一种名为Interleave-VLA的新型机器人学习范式，旨在通过交错的图像-文本指令增强机器人操作。现有的文本指令机器人策略在泛化到未见场景时存在局限，而交错图像-文本指令能提供更丰富、偏差更小的上下文，使机器人更好地处理基于上下文视觉定位的未见任务。论文介绍了首个能够理解交错指令并直接生成连续动作序列的Interleave-VLA范式，以及一个包含21万次交互的大规模真实世界交错数据集Open Interleaved X-Embodiment。实验表明，该方法在域外泛化上比文本基线高2倍，并支持零样本泛化到草图等多样化指令。" />
