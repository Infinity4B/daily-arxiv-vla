    <title>Expertise need not monopolize: Action-Specialized Mixture of Experts for Vision-Language-Action Learning - 封面卡</title>
    <meta name="description" content="论文针对Vision-Language-Action (VLA)模型在扩展时面临的挑战（如计算资源需求高、实时控制效率与模型容量平衡难题），提出了AdaMoE（Action-Specialized Mixture of Experts）架构。AdaMoE通过继承预训练VLA模型权重，并在动作专家中引入稀疏激活的MoE层来扩展模型容量，同时利用解耦专家选择与权重的创新设计，在保持计算效率的前提下提升性能。论文在仿真基准（LIBERO和RoboTwin 2.0）和真实世界实验中验证了AdaMoE的有效性。" />
