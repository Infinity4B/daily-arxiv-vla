    <title>SimpleVLA-RL: Scaling VLA Training via Reinforcement Learning - 封面卡</title>
    <meta name="description" content="论文针对视觉-语言-动作（VLA）模型在监督微调（SFT）阶段面临的两个核心挑战：大规模人类操作轨迹数据的稀缺与高昂成本，以及在分布偏移任务上的泛化能力有限。受大型推理模型通过强化学习（RL）取得成功的启发，论文提出了SimpleVLA-RL，一个专为VLA模型设计的高效在线强化学习框架。该方法基于veRL框架，实现了交互式轨迹采样、可扩展的并行化和优化的损失计算。通过采用简单的二元结果奖励和一系列探索增强策略，该方法在LIBERO和RoboTwin等基准上取得了最先进的性能，显著提升了数据效率和泛化能力，并能有效迁移至真实世界任务。此外，研究还发现了一种名为“pushcut”的新颖行为模式，即策略在RL训练中学会了训练数据之外的新策略。" />
