    <title>UP-VLA: A Unified Understanding and Prediction Model for Embodied Agent - 封面卡</title>
    <meta name="description" content="该论文提出了UP-VLA (Unified Understanding and Prediction Model for Embodied Agent)，一种用于具身智能体的统一理解与预测模型。作者指出，现有的视觉-语言-动作 (VLA) 模型通常依赖于预训练的视觉-语言模型 (VLM)，虽然VLMs提供了丰富的语义知识，但它们往往关注高层语义内容而忽略了低层特征，限制了模型捕获对机器人控制至关重要的详细视觉和空间信息的能力。为了解决这一问题，UP-VLA引入了一种新的训练范式，将多模态理解和未来预测目标相结合。该模型旨在同时增强高层语义理解和低层空间理解，实验证明其在模拟和真实世界的操作任务中均取得了显著的性能提升，特别是在Calvin ABC-D基准上相比之前的最先进方法实现了33%的改进。" />
