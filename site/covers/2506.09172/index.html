    <title>An Open-Source Software Toolkit &amp; Benchmark Suite for the Evaluation and Adaptation of Multimodal Action Models - 封面卡</title>
    <meta name="description" content="论文介绍了 MultiNet，一个全新的、完全开源的基准测试和配套的软件生态系统，旨在严格评估和适应视觉、语言和动作领域的模型。该工作建立了标准化的评估协议来评估视觉语言模型（VLMs）和视觉-语言-动作模型（VLAs），并提供开源软件以下载相关数据、模型和进行评估。此外，论文提供了一个包含超过1.3万亿个令牌的复合数据集，涵盖了图像字幕、视觉问答、常识推理、机器人控制、数字游戏、模拟运动/操作等多种任务。MultiNet 的基准、框架、工具包和评估框架已被用于下游研究，探讨VLA泛化的局限性。" />
