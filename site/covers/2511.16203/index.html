    <title>When Alignment Fails: Multimodal Adversarial Attacks on Vision-Language-Action Models - 封面卡</title>
    <meta name="description" content="本文关注视觉-语言-动作（VLA）模型在具身环境中的对抗鲁棒性问题。尽管VLA模型在机器人感知、推理和行动方面取得了显著进展，但其对抗鲁棒性，尤其是在现实多模态和黑盒条件下的表现，尚未被充分探索。现有研究主要集中于单模态扰动，而忽视了影响具身推理和决策的根本性跨模态不对齐问题。为此，论文提出了VLA-Fool，这是一个在白盒和黑盒设置下对具身VLA模型多模态对抗鲁棒性的综合研究套件。VLA-Fool统一了三个层次的多模态对抗攻击：文本扰动、视觉扰动和跨模态不对齐攻击。在LIBERO基准上使用微调的OpenVLA模型进行的实验表明，即使是轻微的多模态扰动也可能导致显著的行为偏差，揭示了具身多模态对齐的脆弱性。" />
