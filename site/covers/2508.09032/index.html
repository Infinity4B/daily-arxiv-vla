    <title>Spatial Traces: Enhancing VLA Models with Spatial-Temporal Understanding - 封面卡</title>
    <meta name="description" content="该论文提出了一种名为“Spatial Traces”的新方法，旨在增强视觉-语言-动作（VLA）模型。该方法通过将历史关键点的视觉轨迹投影到深度图上，将空间信息和时间信息集成到一个统一的视觉提示中。这种设计使得模型能够同时捕捉空间和时间上下文，从而提高在复杂操作任务中的性能。在SimplerEnv环境中的实验表明，该方法仅需最少的训练数据即可实现性能提升，其平均任务完成成功率比SpatialVLA高出4%，比TraceVLA高出19%。" />
